settings:
  cache_dir: "./cache"
  output_dir: "./output"
  retention_depth: 1
  architectures:
    - arm64-v8a
  repack_xapk: true
  sign:
    enabled: false

sources:
  webdl:
    throttle_policy: dumb
    throttle_interval: 1s
    delay_between_requests: 1s
    packages:
      - filename: "test.xapk"
        url: "http://127.0.0.1:8766/test.xapk"

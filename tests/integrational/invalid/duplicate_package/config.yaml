settings:
  cache_dir: "./cache"
  output_dir: "./output"
  retention_depth: 1
  architectures:
    - arm64-v8a

sources:
  google_play:
    throttle_policy: dumb
    throttle_interval: 24h
    delay_between_requests: 2s
    packages:
      - com.example.app
  rustore:
    throttle_policy: metadata
    throttle_interval: 24h
    delay_between_requests: 2s
    packages:
      - com.example.app

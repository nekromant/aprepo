settings:
  cache_dir: "./cache"
  output_dir: "./output"
  retention_depth: 1
  architectures:
    - arm64-v8a

sources:
  webdl:
    throttle_policy: metadata
    throttle_interval: 1s
    delay_between_requests: 1s
    packages:
      - filename: "test.apk"
        url: "http://127.0.0.1:8765/test.apk"

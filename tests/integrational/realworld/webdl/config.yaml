settings:
  cache_dir: "./cache"
  output_dir: "./output"
  retention_depth: 1
  architectures:
    - arm64-v8a
  repack_xapk: false

sources:
  webdl:
    throttle_policy: metadata
    throttle_interval: 1s
    delay_between_requests: 1s
    packages:
      - filename: "org.telegram.messenger.apk"
        url: "https://telegram.org/dl/android/apk"

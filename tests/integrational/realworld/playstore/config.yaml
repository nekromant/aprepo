settings:
  cache_dir: "./cache"
  output_dir: "./output"
  retention_depth: 1
  architectures:
    - arm64-v8a
  repack_xapk: false

sources:
  google_play:
    throttle_policy: dumb
    throttle_interval: 1s
    delay_between_requests: 1s
    token: "$PLAYSTORE_TOKEN"
    user: "$PLAYSTORE_USER"
    packages:
      - com.taobao.taobao

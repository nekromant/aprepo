settings:
  cache_dir: "./cache"
  output_dir: "./output"
  retention_depth: 1
  architectures:
    - arm64-v8a
  repack_xapk: false

sources:
  github:
    throttle_policy: metadata
    throttle_interval: 1s
    delay_between_requests: 1s
    token: "$GITHUB_TOKEN"
    packages:
      - repo: "topjohnwu/Magisk"
        mask: "Magisk*apk"
